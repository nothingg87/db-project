<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現代寵物醫院管理系統</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; background: #f4f6f9; color: #1a1a1a; display: flex; height: 100vh; overflow: hidden; font-size: 14px; }

/* ── Sidebar ── */
#sidebar { width: 220px; background: #1e2330; display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar .logo { padding: 20px 18px 16px; border-bottom: 1px solid #2d3347; }
#sidebar .logo-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.4; }
#sidebar .logo-sub { font-size: 11px; color: #6b7280; margin-top: 2px; }
#sidebar nav { flex: 1; padding: 12px 0; }
#sidebar nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px; color: #9ca3af; font-size: 13px;
  cursor: pointer; border-left: 3px solid transparent;
  transition: all .15s; text-decoration: none; user-select: none;
}
#sidebar nav a:hover { color: #e5e7eb; background: #252b3b; }
#sidebar nav a.active { color: #fff; background: #252b3b; border-left-color: #3b82f6; }
#sidebar nav a .icon { font-size: 16px; width: 20px; text-align: center; }
#sidebar .user-info { padding: 14px 18px; border-top: 1px solid #2d3347; }
#sidebar .user-role { font-size: 11px; color: #6b7280; }
#sidebar .user-name { font-size: 13px; color: #d1d5db; margin-top: 2px; }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#topbar .page-title { font-size: 15px; font-weight: 500; }
#content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Cards & Forms ── */
.card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
.card-title { font-size: 12px; color: #6b7280; margin-bottom: 12px; font-weight: 500; letter-spacing: .3px; text-transform: uppercase; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: #6b7280; }
input[type=text], input[type=date], input[type=number], select, textarea {
  border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 10px;
  font-size: 13px; color: #1a1a1a; background: #fafafa; width: 100%;
  font-family: inherit; outline: none; transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: #3b82f6; background: #fff; }
input:disabled, select:disabled { background: #f0f0f0; color: #9ca3af; cursor: not-allowed; }
textarea { resize: none; }

/* ── Buttons ── */
.btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
button { border: 1px solid #d1d5db; background: #fff; border-radius: 6px; padding: 7px 16px; font-size: 13px; cursor: pointer; font-family: inherit; transition: all .15s; }
button:hover { background: #f9fafb; }
button:active { transform: scale(.98); }
.btn-primary { background: #3b82f6; color: #fff; border-color: #2563eb; }
.btn-primary:hover { background: #2563eb; }
.btn-success { background: #22c55e; color: #fff; border-color: #16a34a; }
.btn-success:hover { background: #16a34a; }
.btn-danger { background: #ef4444; color: #fff; border-color: #dc2626; }
.btn-danger:hover { background: #dc2626; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ── Badges ── */
.badge { font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 500; }
.badge-blue { background: #dbeafe; color: #1e40af; }
.badge-green { background: #dcfce7; color: #166534; }
.badge-amber { background: #fef9c3; color: #854d0e; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-gray { background: #f3f4f6; color: #374151; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #e5e7eb; font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
td { padding: 10px 10px; border-bottom: 1px solid #f3f4f6; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9fafb; }

/* ── Chips / slots ── */
.slot-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.slot { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 1px solid; cursor: pointer; transition: all .15s; }
.slot.free { background: #f0fdf4; border-color: #86efac; color: #166534; }
.slot.free:hover { background: #dcfce7; }
.slot.busy { background: #f9fafb; border-color: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
.slot.selected { background: #3b82f6; border-color: #2563eb; color: #fff; }

/* ── Treatment rows ── */
.td-row { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid #f3f4f6; }
.td-row:last-child { border-bottom: none; }
.td-name { flex: 1; font-size: 13px; }
.td-meta { font-size: 12px; color: #6b7280; white-space: nowrap; }
.td-price { font-size: 13px; color: #374151; white-space: nowrap; min-width: 56px; text-align: right; }
.td-del { background: none; border: none; color: #d1d5db; font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; }
.td-del:hover { color: #ef4444; }

/* ── Subtotal ── */
.subtotal-row { display: flex; justify-content: space-between; padding: 8px 0 0; font-size: 14px; font-weight: 600; }

/* ── Alert ── */
.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; border: 1px solid; }
.alert-success { background: #f0fdf4; border-color: #86efac; color: #166534; }
.alert-error { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
.alert-info { background: #eff6ff; border-color: #93c5fd; color: #1e40af; }

/* ── Invoice ── */
.inv-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
.inv-row:last-child { border-bottom: none; }
.inv-total { display: flex; justify-content: space-between; padding: 10px 0 0; font-size: 15px; font-weight: 600; }

/* ── Divider ── */
hr { border: none; border-top: 1px solid #e5e7eb; margin: 10px 0; }

/* ── Page toggle ── */
.page { display: none; }
.page.active { display: block; }

/* ── Search bar ── */
.search-row { display: flex; gap: 8px; margin-bottom: 14px; }
.search-row input { flex: 1; }

/* ── Pet info chip ── */
.pet-chip { display: inline-flex; align-items: center; gap: 6px; background: #f3f4f6; border-radius: 8px; padding: 6px 12px; font-size: 13px; }

/* ── Record list ── */
.rec-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
.rec-item:last-child { border-bottom: none; }
.rec-item:hover { background: #f9fafb; margin: 0 -18px; padding: 10px 18px; border-radius: 6px; }
.rec-meta { font-size: 12px; color: #6b7280; margin-top: 2px; }

/* ── Payment radio ── */
.pay-options { display: flex; gap: 20px; margin-bottom: 12px; }
.pay-options label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }

/* ── Toast ── */
#toast { position: fixed; bottom: 24px; right: 24px; background: #1e2330; color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 13px; transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; max-width: 280px; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { background: #166534; }
#toast.error { background: #991b1b; }

/* ── Modal ── */
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
#modal-overlay.show { display: flex; }
#modal-box { background: #fff; border-radius: 12px; padding: 24px; width: 420px; max-width: 90vw; }
#modal-box h3 { font-size: 15px; margin-bottom: 16px; }
#modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

.section-spacer { height: 8px; }
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div class="logo">
    <div class="logo-title">🐾 現代寵物醫院</div>
    <div class="logo-sub">醫療與營運管理系統</div>
  </div>
  <nav>
    <a class="active" data-page="appointment" onclick="navigate('appointment')">
      <span class="icon">📅</span> 掛號預約
    </a>
    <a data-page="medical" onclick="navigate('medical')">
      <span class="icon">📋</span> 病歷 / 處方
    </a>
    <a data-page="invoice" onclick="navigate('invoice')">
      <span class="icon">🧾</span> 帳單結算
    </a>
  </nav>
  <div class="user-info">
    <div class="user-role">櫃檯行政 · Role 1</div>
    <div class="user-name">王小美</div>
  </div>
</aside>

<!-- ── Main ── -->
<div id="main">
  <div id="topbar">
    <div class="page-title" id="topbar-title">掛號預約</div>
    <div style="font-size:12px;color:#6b7280;" id="topbar-date"></div>
  </div>
  <div id="content">

    <!-- ══════════════════════════════════════
         PAGE 1：掛號預約
    ══════════════════════════════════════ -->
    <div class="page active" id="page-appointment">

      <!-- 搜尋飼主 -->
      <div class="card">
        <div class="card-title">飼主與寵物</div>
        <div class="search-row">
          <input type="text" id="owner-search" placeholder="搜尋飼主姓名或電話…" oninput="searchOwner(this.value)">
          <button onclick="searchOwner(document.getElementById('owner-search').value)">搜尋</button>
        </div>
        <div id="owner-results"></div>
      </div>

      <!-- 選擇寵物（選完飼主才出現） -->
      <div class="card" id="pet-card" style="display:none;">
        <div class="card-title">選擇寵物</div>
        <div class="form-grid">
          <div class="field">
            <label>寵物</label>
            <select id="pet-select" onchange="selectPet(this.value)">
              <option value="">— 選擇 —</option>
            </select>
          </div>
          <div class="field">
            <label>物種（自動帶入）</label>
            <input id="pet-species" disabled>
          </div>
        </div>
        <div id="pet-detail" style="display:none;" class="pet-chip"></div>
      </div>

      <!-- 預約時段 -->
      <div class="card" id="schedule-card" style="display:none;">
        <div class="card-title">預約時段</div>
        <div class="form-grid">
          <div class="field">
            <label>日期</label>
            <input type="date" id="appt-date" onchange="loadSchedule()">
          </div>
          <div class="field">
            <label>主治醫師</label>
            <select id="doctor-select" onchange="loadSchedule()">
              <option value="">— 選擇醫師 —</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>可預約時段</label>
          <div class="slot-grid" id="slot-grid">
            <span style="font-size:12px;color:#9ca3af;">請先選擇日期與醫師</span>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button onclick="resetAppointment()">清除</button>
        <button class="btn-primary" onclick="submitAppointment()">✓ 確認預約</button>
      </div>
    </div>

    <!-- ══════════════════════════════════════
         PAGE 2：病歷建立 / 開立處方
    ══════════════════════════════════════ -->
    <div class="page" id="page-medical">

      <!-- 選擇今日預約 -->
      <div class="card" id="appt-list-card">
        <div class="card-title">今日預約（點選開始看診）</div>
        <div id="today-appts">
          <span style="font-size:12px;color:#9ca3af;">載入中…</span>
        </div>
      </div>

      <!-- 看診區（選完預約才顯示） -->
      <div id="medical-form" style="display:none;">

        <!-- 基本資訊 -->
        <div class="card">
          <div class="card-title">就診基本資訊</div>
          <div class="form-grid">
            <div>
              <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">寵物</div>
              <div id="mr-pet-info" style="font-size:13px;font-weight:500;"></div>
            </div>
            <div>
              <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">飼主</div>
              <div id="mr-owner-info" style="font-size:13px;"></div>
            </div>
          </div>
          <div class="form-grid">
            <div class="field"><label>看診日期</label><input type="date" id="mr-date" disabled></div>
            <div class="field"><label>主治醫師</label><input type="text" id="mr-doctor" disabled></div>
          </div>
        </div>

        <!-- 臨床觀察與診斷 -->
        <div class="card">
          <div class="card-title">臨床觀察與診斷</div>
          <div class="field" style="margin-bottom:10px;">
            <label>Clinical Notes（主觀觀察）</label>
            <textarea id="mr-notes" rows="2" placeholder="食慾不振、發燒 39.5°C…"></textarea>
          </div>
          <div class="field">
            <label>Final Diagnosis（最終診斷）</label>
            <textarea id="mr-diagnosis" rows="2" placeholder="急性上呼吸道感染…"></textarea>
          </div>
        </div>

        <!-- 治療明細 -->
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div class="card-title" style="margin:0;">治療明細</div>
            <button class="btn-sm" onclick="openAddItem()">＋ 新增項目</button>
          </div>
          <div id="td-list">
            <div style="font-size:12px;color:#9ca3af;padding:8px 0;">尚未新增任何項目</div>
          </div>
          <hr>
          <div class="subtotal-row">
            <span style="font-size:13px;color:#6b7280;">小計（Total_Billed）</span>
            <span id="td-subtotal">$0</span>
          </div>
        </div>

        <div id="medical-alert"></div>

        <div class="btn-row">
          <button onclick="saveDraft()">儲存草稿</button>
          <button class="btn-danger" onclick="lockRecord()">🔒 完成看診</button>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════
         PAGE 3：帳單結算
    ══════════════════════════════════════ -->
    <div class="page" id="page-invoice">

      <div class="card">
        <div class="card-title">待結帳帳單</div>
        <div id="invoice-list">
          <span style="font-size:12px;color:#9ca3af;">載入中…</span>
        </div>
      </div>

      <!-- 帳單詳情 -->
      <div id="invoice-detail" style="display:none;">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <div>
              <div id="inv-title" style="font-size:15px;font-weight:500;"></div>
              <div id="inv-meta" style="font-size:12px;color:#6b7280;margin-top:2px;"></div>
            </div>
            <span class="badge badge-amber">待結帳</span>
          </div>
          <div class="card-title">費用明細（自動加總）</div>
          <div id="inv-items"></div>
          <hr>
          <div class="inv-total">
            <span>總計 Total_Billed</span>
            <span id="inv-total-amt"></span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">付款方式</div>
          <div class="pay-options" id="pay-options">
            <label><input type="radio" name="pay" value="cash" checked> 現金</label>
            <label><input type="radio" name="pay" value="card"> 信用卡</label>
            <label><input type="radio" name="pay" value="insurance"> 保險</label>
          </div>
          <div class="field"><label>備註</label><input type="text" id="inv-note" placeholder="選填…"></div>
        </div>

        <div class="btn-row">
          <button onclick="printInvoice()">列印帳單</button>
          <button class="btn-success" onclick="confirmPayment()">✓ 確認收款（Payment_Status = 1）</button>
        </div>
      </div>
    </div>

  </div><!-- #content -->
</div><!-- #main -->

<!-- ── Modal：新增治療項目 ── -->
<div id="modal-overlay">
  <div id="modal-box">
    <h3>新增治療 / 處方項目</h3>
    <div class="field" style="margin-bottom:12px;">
      <label>選擇項目（Catalog_Items）</label>
      <select id="item-select" onchange="onItemSelect(this.value)">
        <option value="">— 選擇 —</option>
      </select>
    </div>
    <div class="form-grid" id="item-fields" style="display:none;">
      <div class="field">
        <label id="qty-label">數量</label>
        <input type="number" id="item-qty" min="1" value="1" oninput="calcItemTotal()">
      </div>
      <div class="field">
        <label>單價（Historical_Price）</label>
        <input type="text" id="item-price" disabled>
      </div>
    </div>
    <div id="item-total" style="font-size:13px;color:#6b7280;margin-top:4px;"></div>
    <div id="modal-actions">
      <button onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="addItem()">新增</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIGURATION
   將 API_BASE 改為你的 FastAPI server URL 後即可連接真實後端。
   目前使用 Mock Data。
═══════════════════════════════════════════════════ */
const API_BASE = 'http://localhost:8000';
const USE_MOCK = true; // 改成 false 使用真實 API

/* ═══════════════════════════════════════════════════
   MOCK DATA
═══════════════════════════════════════════════════ */
const MOCK = {
  owners: [
    { owner_id: 1, name: '陳小明', phone: '0912-345-678' },
    { owner_id: 2, name: '林美玲', phone: '0987-654-321' },
    { owner_id: 3, name: '張大偉', phone: '0933-111-222' },
  ],
  pets: [
    { pet_id: 1, owner_id: 1, name: '小白', species: '貓', birth_date: '2024-03-10', weight: 3.2 },
    { pet_id: 2, owner_id: 1, name: '旺財', species: '犬', birth_date: '2022-07-22', weight: 8.5 },
    { pet_id: 3, owner_id: 2, name: '毛球', species: '兔', birth_date: '2023-11-01', weight: 1.8 },
    { pet_id: 4, owner_id: 3, name: '咕嚕', species: '貓', birth_date: '2021-05-15', weight: 4.1 },
  ],
  doctors: [
    { doctor_id: 1, name: '王大明', specialty: '一般內科' },
    { doctor_id: 2, name: '李小芬', specialty: '外科' },
    { doctor_id: 3, name: '趙志遠', specialty: '皮膚科' },
  ],
  appointments: [
    { appt_id: 1, pet_id: 1, owner_id: 1, doctor_id: 1, date: today(), time: '09:00', status: 'pending' },
    { appt_id: 2, pet_id: 3, owner_id: 2, doctor_id: 2, date: today(), time: '10:00', status: 'pending' },
    { appt_id: 3, pet_id: 4, owner_id: 3, doctor_id: 1, date: today(), time: '11:00', status: 'pending' },
  ],
  catalog: [
    { item_id: 1, name: '阿莫西林 250mg', category: '藥品', current_price: 20, stock: 500 },
    { item_id: 2, name: '血液常規檢查', category: '檢驗', current_price: 650, stock: 99 },
    { item_id: 3, name: '點滴（500ml）', category: '治療', current_price: 350, stock: 80 },
    { item_id: 4, name: 'X 光檢查', category: '檢驗', current_price: 900, stock: 99 },
    { item_id: 5, name: '疫苗（三合一）', category: '疫苗', current_price: 800, stock: 30 },
    { item_id: 6, name: '外科縫合處置', category: '治療', current_price: 1200, stock: 99 },
  ],
  // records / invoices 在 runtime 新增
  records: [],
  invoices: [],
};

// Busy slots per doctor per date (mock)
const BUSY = {
  1: ['10:00','14:00'],
  2: ['09:00','11:00'],
  3: ['13:00'],
};
const ALL_SLOTS = ['09:00','10:00','11:00','13:00','14:00','15:00','16:00'];

function today() {
  return new Date().toISOString().slice(0,10);
}

function calcAge(birth) {
  const diff = Date.now() - new Date(birth).getTime();
  const y = Math.floor(diff / (365.25*24*3600*1000));
  const m = Math.floor((diff % (365.25*24*3600*1000)) / (30.44*24*3600*1000));
  return y > 0 ? `${y}歲` : `${m}個月`;
}

/* ═══════════════════════════════════════════════════
   API WRAPPER
═══════════════════════════════════════════════════ */
async function api(method, path, body) {
  if (USE_MOCK) return mockApi(method, path, body);
  const r = await fetch(API_BASE + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function mockApi(method, path, body) {
  // Simulate async
  return new Promise((res, rej) => setTimeout(() => {
    try { res(mockRoute(method, path, body)); }
    catch(e) { rej(e); }
  }, 80));
}

let nextId = 100;
function mockRoute(method, path, body) {
  if (path.startsWith('/owners/search')) {
    const q = new URL('http://x'+path).searchParams.get('q') || '';
    return MOCK.owners.filter(o =>
      o.name.includes(q) || o.phone.includes(q)
    );
  }
  if (path.startsWith('/pets?owner_id=')) {
    const oid = parseInt(path.split('=')[1]);
    return MOCK.pets.filter(p => p.owner_id === oid);
  }
  if (path === '/doctors') return MOCK.doctors;
  if (path.startsWith('/schedule')) {
    const params = new URL('http://x'+path).searchParams;
    const did = parseInt(params.get('doctor_id'));
    const busy = BUSY[did] || [];
    return ALL_SLOTS.map(t => ({ time: t, available: !busy.includes(t) }));
  }
  if (method === 'POST' && path === '/appointments') {
    const a = { appt_id: nextId++, ...body, status: 'pending' };
    MOCK.appointments.push(a);
    return a;
  }
  if (path.startsWith('/appointments/today')) {
    const d = today();
    return MOCK.appointments.filter(a => a.date === d && a.status === 'pending')
      .map(a => ({
        ...a,
        pet: MOCK.pets.find(p => p.pet_id === a.pet_id),
        owner: MOCK.owners.find(o => o.owner_id === a.owner_id),
        doctor: MOCK.doctors.find(d => d.doctor_id === a.doctor_id),
      }));
  }
  if (path === '/catalog') return MOCK.catalog;
  if (method === 'POST' && path === '/records') {
    const r = { record_id: nextId++, ...body, locked: false, details: [] };
    MOCK.records.push(r);
    const inv = { invoice_id: nextId++, record_id: r.record_id, total_billed: 0, payment_status: 0 };
    MOCK.invoices.push(inv);
    return r;
  }
  if (method === 'POST' && path.includes('/details')) {
    const rid = parseInt(path.split('/')[2]);
    const rec = MOCK.records.find(r => r.record_id === rid);
    const item = MOCK.catalog.find(i => i.item_id === body.item_id);
    const detail = { detail_id: nextId++, ...body, historical_price: item.current_price };
    rec.details.push(detail);
    // trigger: update invoice
    const inv = MOCK.invoices.find(i => i.record_id === rid);
    inv.total_billed += detail.historical_price * detail.numeric_value;
    return detail;
  }
  if (method === 'DELETE' && path.includes('/details/')) {
    const parts = path.split('/');
    const rid = parseInt(parts[2]);
    const did = parseInt(parts[4]);
    const rec = MOCK.records.find(r => r.record_id === rid);
    const idx = rec.details.findIndex(d => d.detail_id === did);
    if (idx >= 0) {
      const d = rec.details[idx];
      const inv = MOCK.invoices.find(i => i.record_id === rid);
      inv.total_billed -= d.historical_price * d.numeric_value;
      rec.details.splice(idx,1);
    }
    return { ok: true };
  }
  if (method === 'PATCH' && path.includes('/lock')) {
    const rid = parseInt(path.split('/')[2]);
    const rec = MOCK.records.find(r => r.record_id === rid);
    rec.locked = true;
    // mark appointment done
    const a = MOCK.appointments.find(a => a.appt_id === rec.appt_id);
    if (a) a.status = 'done';
    return rec;
  }
  if (method === 'PATCH' && path.includes('/records/') && path.includes('/draft')) {
    return { ok: true };
  }
  if (path === '/invoices/pending') {
    return MOCK.invoices
      .filter(i => i.payment_status === 0)
      .filter(i => {
        const r = MOCK.records.find(r => r.record_id === i.record_id);
        return r && r.locked;
      })
      .map(i => {
        const rec = MOCK.records.find(r => r.record_id === i.record_id);
        const pet = MOCK.pets.find(p => p.pet_id === rec.pet_id);
        const owner = MOCK.owners.find(o => o.owner_id === rec.owner_id);
        return { ...i, record: rec, pet, owner };
      });
  }
  if (method === 'PATCH' && path.includes('/pay')) {
    const iid = parseInt(path.split('/')[2]);
    const inv = MOCK.invoices.find(i => i.invoice_id === iid);
    inv.payment_status = 1;
    inv.payment_method = body.payment_method;
    inv.note = body.note;
    return inv;
  }
  throw new Error('未實作: ' + method + ' ' + path);
}

/* ═══════════════════════════════════════════════════
   TOAST / ALERT
═══════════════════════════════════════════════════ */
let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

function setAlert(id, msg, type='info') {
  const el = document.getElementById(id);
  el.innerHTML = msg ? `<div class="alert alert-${type}">${msg}</div>` : '';
}

/* ═══════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════ */
const PAGE_TITLES = {
  appointment: '掛號預約',
  medical: '病歷建立 ／ 開立處方',
  invoice: '帳單結算',
};

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#sidebar nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page];
  if (page === 'medical') loadTodayAppts();
  if (page === 'invoice') loadInvoices();
}

/* ═══════════════════════════════════════════════════
   PAGE 1：掛號預約
═══════════════════════════════════════════════════ */
let apptState = { owner: null, pet: null, doctor_id: null, time: null };

async function searchOwner(q) {
  if (!q || q.trim().length < 1) {
    document.getElementById('owner-results').innerHTML = '';
    return;
  }
  const owners = await api('GET', `/owners/search?q=${encodeURIComponent(q)}`);
  const el = document.getElementById('owner-results');
  if (!owners.length) {
    el.innerHTML = '<div style="font-size:12px;color:#9ca3af;padding:4px 0;">找不到飼主</div>';
    return;
  }
  el.innerHTML = '<table>' +
    '<thead><tr><th>姓名</th><th>電話</th><th></th></tr></thead><tbody>' +
    owners.map(o => `
      <tr>
        <td>${o.name}</td>
        <td>${o.phone}</td>
        <td><button class="btn-sm btn-primary" onclick="selectOwner(${o.owner_id})">選擇</button></td>
      </tr>`).join('') +
    '</tbody></table>';
}

async function selectOwner(id) {
  const owners = await api('GET', `/owners/search?q=`);
  // We'll just get from mock directly for simplicity
  apptState.owner = MOCK.owners.find(o => o.owner_id === id) || { owner_id: id };
  document.getElementById('owner-results').innerHTML =
    `<div class="pet-chip">✓ ${apptState.owner.name}　${apptState.owner.phone}</div>`;

  const pets = await api('GET', `/pets?owner_id=${id}`);
  const sel = document.getElementById('pet-select');
  sel.innerHTML = '<option value="">— 選擇 —</option>' +
    pets.map(p => `<option value="${p.pet_id}">${p.name}（${p.species}）</option>`).join('');
  document.getElementById('pet-card').style.display = '';

  // Load doctors
  const docs = await api('GET', '/doctors');
  const dsel = document.getElementById('doctor-select');
  dsel.innerHTML = '<option value="">— 選擇醫師 —</option>' +
    docs.map(d => `<option value="${d.doctor_id}">${d.name}（${d.specialty}）</option>`).join('');

  // Set today's date
  document.getElementById('appt-date').value = today();
}

function selectPet(pid) {
  if (!pid) { document.getElementById('pet-detail').style.display='none'; document.getElementById('schedule-card').style.display='none'; return; }
  const pet = MOCK.pets.find(p => p.pet_id == pid);
  if (!pet) return;
  apptState.pet = pet;
  document.getElementById('pet-species').value = pet.species;
  document.getElementById('pet-detail').style.display = '';
  document.getElementById('pet-detail').innerHTML =
    `🐾 ${pet.name}　${pet.species}　${calcAge(pet.birth_date)}　${pet.weight} kg`;
  document.getElementById('schedule-card').style.display = '';
}

async function loadSchedule() {
  const date = document.getElementById('appt-date').value;
  const did = document.getElementById('doctor-select').value;
  if (!date || !did) return;
  apptState.doctor_id = parseInt(did);
  apptState.time = null;

  const slots = await api('GET', `/schedule?doctor_id=${did}&date=${date}`);
  const grid = document.getElementById('slot-grid');
  grid.innerHTML = slots.map(s => `
    <div class="slot ${s.available ? 'free' : 'busy'}"
         onclick="${s.available ? `selectSlot('${s.time}',this)` : ''}">
      ${s.available ? '✓' : '✗'} ${s.time}
    </div>`).join('');
}

function selectSlot(time, el) {
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  apptState.time = time;
}

async function submitAppointment() {
  if (!apptState.owner) return toast('請先選擇飼主', 'error');
  if (!apptState.pet)   return toast('請選擇寵物', 'error');
  if (!apptState.doctor_id) return toast('請選擇醫師', 'error');
  if (!apptState.time)  return toast('請選擇時段', 'error');
  const date = document.getElementById('appt-date').value;
  await api('POST', '/appointments', {
    pet_id: apptState.pet.pet_id,
    owner_id: apptState.owner.owner_id,
    doctor_id: apptState.doctor_id,
    date, time: apptState.time,
  });
  toast('✓ 預約成功！', 'success');
  resetAppointment();
}

function resetAppointment() {
  apptState = { owner: null, pet: null, doctor_id: null, time: null };
  document.getElementById('owner-search').value = '';
  document.getElementById('owner-results').innerHTML = '';
  document.getElementById('pet-card').style.display = 'none';
  document.getElementById('schedule-card').style.display = 'none';
}

/* ═══════════════════════════════════════════════════
   PAGE 2：病歷 / 處方
═══════════════════════════════════════════════════ */
let mrState = { appt: null, record_id: null, details: [] };

async function loadTodayAppts() {
  const appts = await api('GET', '/appointments/today');
  const el = document.getElementById('today-appts');
  if (!appts.length) {
    el.innerHTML = '<div style="font-size:12px;color:#9ca3af;padding:8px 0;">今日無待診預約</div>';
    return;
  }
  el.innerHTML = appts.map(a => `
    <div class="rec-item" onclick="startVisit(${a.appt_id})">
      <div>
        <div style="font-size:13px;font-weight:500;">${a.pet.name}（${a.pet.species}）</div>
        <div class="rec-meta">${a.time}　飼主：${a.owner.name}　醫師：${a.doctor.name}</div>
      </div>
      <span class="badge badge-amber">待診</span>
    </div>`).join('');
}

async function startVisit(apptId) {
  const appts = await api('GET', '/appointments/today');
  const a = appts.find(x => x.appt_id === apptId);
  if (!a) return;
  mrState.appt = a;
  mrState.details = [];

  // Create record
  const rec = await api('POST', '/records', {
    appt_id: a.appt_id,
    pet_id: a.pet.pet_id,
    owner_id: a.owner.owner_id,
    doctor_id: a.doctor.doctor_id,
    date: today(),
  });
  mrState.record_id = rec.record_id;

  // Fill UI
  document.getElementById('mr-pet-info').textContent =
    `${a.pet.name}（${a.pet.species}・${calcAge(a.pet.birth_date)}・${a.pet.weight} kg）`;
  document.getElementById('mr-owner-info').textContent = a.owner.name;
  document.getElementById('mr-date').value = today();
  document.getElementById('mr-doctor').value = a.doctor.name;
  document.getElementById('mr-notes').value = '';
  document.getElementById('mr-diagnosis').value = '';
  document.getElementById('appt-list-card').style.display = 'none';
  document.getElementById('medical-form').style.display = '';
  renderTdList();

  // load catalog
  const catalog = await api('GET', '/catalog');
  const sel = document.getElementById('item-select');
  sel.innerHTML = '<option value="">— 選擇 —</option>' +
    catalog.map(c => `<option value="${c.item_id}">${c.name}（${c.category}）$${c.current_price}</option>`).join('');
}

function renderTdList() {
  const el = document.getElementById('td-list');
  if (!mrState.details.length) {
    el.innerHTML = '<div style="font-size:12px;color:#9ca3af;padding:8px 0;">尚未新增任何項目</div>';
    document.getElementById('td-subtotal').textContent = '$0';
    return;
  }
  const total = mrState.details.reduce((s,d) => s + d.historical_price * d.numeric_value, 0);
  el.innerHTML = mrState.details.map(d => {
    const item = MOCK.catalog.find(c => c.item_id === d.item_id);
    return `<div class="td-row">
      <span class="badge badge-blue" style="font-size:11px;">${item?.category||''}</span>
      <span class="td-name">${item?.name||''}</span>
      <span class="td-meta">×${d.numeric_value}　$${d.historical_price}</span>
      <span class="td-price">$${d.historical_price * d.numeric_value}</span>
      <button class="td-del" onclick="removeDetail(${d.detail_id})">×</button>
    </div>`;
  }).join('');
  document.getElementById('td-subtotal').textContent = '$' + total.toLocaleString();
}

function openAddItem() {
  document.getElementById('item-select').value = '';
  document.getElementById('item-fields').style.display = 'none';
  document.getElementById('item-total').textContent = '';
  document.getElementById('item-qty').value = 1;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function onItemSelect(id) {
  if (!id) { document.getElementById('item-fields').style.display='none'; return; }
  const item = MOCK.catalog.find(c => c.item_id == id);
  document.getElementById('item-price').value = '$' + item.current_price;
  document.getElementById('qty-label').textContent = item.category === '檢驗' ? '次數' : '數量';
  document.getElementById('item-fields').style.display = '';
  calcItemTotal();
}

function calcItemTotal() {
  const id = document.getElementById('item-select').value;
  if (!id) return;
  const item = MOCK.catalog.find(c => c.item_id == id);
  const qty = parseInt(document.getElementById('item-qty').value) || 1;
  document.getElementById('item-total').textContent = `小計：$${item.current_price * qty}`;
}

async function addItem() {
  const id = parseInt(document.getElementById('item-select').value);
  if (!id) return toast('請選擇項目', 'error');
  const qty = parseInt(document.getElementById('item-qty').value) || 1;
  const detail = await api('POST', `/records/${mrState.record_id}/details`, {
    item_id: id, numeric_value: qty,
  });
  mrState.details.push(detail);
  renderTdList();
  closeModal();
  toast('已新增項目');
}

async function removeDetail(did) {
  await api('DELETE', `/records/${mrState.record_id}/details/${did}`);
  mrState.details = mrState.details.filter(d => d.detail_id !== did);
  renderTdList();
}

async function saveDraft() {
  const notes = document.getElementById('mr-notes').value;
  const diagnosis = document.getElementById('mr-diagnosis').value;
  await api('PATCH', `/records/${mrState.record_id}/draft`, { clinical_notes: notes, final_diagnosis: diagnosis });
  toast('草稿已儲存');
}

async function lockRecord() {
  if (!mrState.details.length) return toast('請先新增至少一項治療項目', 'error');
  const notes = document.getElementById('mr-notes').value;
  const diagnosis = document.getElementById('mr-diagnosis').value;
  if (!notes && !diagnosis) {
    if (!confirm('Clinical Notes 和 Final Diagnosis 皆為空，確定鎖定病歷？')) return;
  }
  await api('PATCH', `/records/${mrState.record_id}/lock`, { clinical_notes: notes, final_diagnosis: diagnosis });
  toast('✓ 病歷已鎖定，帳單已建立', 'success');
  document.getElementById('medical-form').style.display = 'none';
  document.getElementById('appt-list-card').style.display = '';
  mrState = { appt: null, record_id: null, details: [] };
  loadTodayAppts();
}

/* ═══════════════════════════════════════════════════
   PAGE 3：帳單結算
═══════════════════════════════════════════════════ */
let invState = { invoice: null };

async function loadInvoices() {
  const invs = await api('GET', '/invoices/pending');
  const el = document.getElementById('invoice-list');
  document.getElementById('invoice-detail').style.display = 'none';
  if (!invs.length) {
    el.innerHTML = '<div style="font-size:12px;color:#9ca3af;padding:8px 0;">目前沒有待結帳帳單</div>';
    return;
  }
  el.innerHTML = invs.map(i => `
    <div class="rec-item" onclick="openInvoice(${i.invoice_id})">
      <div>
        <div style="font-size:13px;font-weight:500;">Invoice #${i.invoice_id}　${i.pet?.name}（${i.owner?.name}）</div>
        <div class="rec-meta">${i.record?.date}　Total：$${i.total_billed?.toLocaleString()}</div>
      </div>
      <span class="badge badge-amber">待結帳</span>
    </div>`).join('');
}

async function openInvoice(iid) {
  const invs = await api('GET', '/invoices/pending');
  const inv = invs.find(i => i.invoice_id === iid);
  if (!inv) return;
  invState.invoice = inv;

  document.getElementById('inv-title').textContent = `Invoice #${inv.invoice_id}`;
  document.getElementById('inv-meta').textContent =
    `${inv.record?.date}　${inv.pet?.name}（飼主：${inv.owner?.name}）`;

  const items = inv.record?.details || [];
  document.getElementById('inv-items').innerHTML = items.length
    ? items.map(d => {
        const item = MOCK.catalog.find(c => c.item_id === d.item_id);
        return `<div class="inv-row"><span>${item?.name||''} × ${d.numeric_value}</span><span>$${d.historical_price * d.numeric_value}</span></div>`;
      }).join('')
    : '<div style="font-size:12px;color:#9ca3af;">無明細</div>';

  document.getElementById('inv-total-amt').textContent = '$' + (inv.total_billed || 0).toLocaleString();
  document.getElementById('invoice-detail').style.display = '';
  document.getElementById('inv-note').value = '';
}

function printInvoice() {
  window.print();
}

async function confirmPayment() {
  if (!invState.invoice) return;
  const pay = document.querySelector('input[name="pay"]:checked')?.value || 'cash';
  const note = document.getElementById('inv-note').value;
  await api('PATCH', `/invoices/${invState.invoice.invoice_id}/pay`, {
    payment_method: pay, note,
  });
  toast('✓ 收款完成', 'success');
  invState.invoice = null;
  loadInvoices();
}
