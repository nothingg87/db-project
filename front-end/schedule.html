<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預約查詢 — 寵物醫院管理系統</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Noto Sans TC',sans-serif;background:#f4f6f9;color:#1a1a1a;display:flex;height:100vh;overflow:hidden;font-size:14px}
#sidebar{width:220px;background:#1e2330;display:flex;flex-direction:column;flex-shrink:0}
#sidebar .logo{padding:20px 18px 16px;border-bottom:1px solid #2d3347}
#sidebar .logo-title{font-size:14px;font-weight:600;color:#fff;line-height:1.4}
#sidebar .logo-sub{font-size:11px;color:#6b7280;margin-top:2px}
#sidebar nav{flex:1;padding:12px 0}
#sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 18px;color:#9ca3af;font-size:13px;cursor:pointer;border-left:3px solid transparent;text-decoration:none;transition:all .15s}
#sidebar nav a:hover{color:#e5e7eb;background:#252b3b}
#sidebar nav a.active{color:#fff;background:#252b3b;border-left-color:#3b82f6}
#sidebar nav a .icon{font-size:16px;width:20px;text-align:center}
#sidebar .user-info{padding:14px 18px;border-top:1px solid #2d3347}
#sidebar .user-role{font-size:11px;color:#6b7280}
#sidebar .user-name{font-size:13px;color:#d1d5db;margin-top:2px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar .page-title{font-size:15px;font-weight:500}
#content{flex:1;overflow-y:auto;padding:24px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px;margin-bottom:14px}
.card-title{font-size:12px;color:#6b7280;margin-bottom:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:#6b7280}
input[type=date],select{border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;color:#1a1a1a;background:#fafafa;width:100%;font-family:inherit;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#3b82f6;background:#fff}
button{border:1px solid #d1d5db;background:#fff;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
button:hover{background:#f9fafb}
button:active{transform:scale(.98)}
.btn-primary{background:#3b82f6;color:#fff;border-color:#2563eb}
.btn-primary:hover{background:#2563eb}
.btn-sm{padding:5px 12px;font-size:12px}
.badge{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500}
.badge-amber{background:#fef9c3;color:#854d0e}
.badge-green{background:#dcfce7;color:#166534}
.badge-gray{background:#f3f4f6;color:#6b7280}
.badge-red{background:#fee2e2;color:#991b1b}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;border-bottom:2px solid #e5e7eb;font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
td{padding:10px;border-bottom:1px solid #f3f4f6}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
tr.cancelled td{opacity:.45;text-decoration:line-through}
.summary-row{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.summary-chip{background:#f3f4f6;border-radius:8px;padding:8px 14px;font-size:13px}
.summary-chip span{font-weight:600;margin-left:4px}
#toast{position:fixed;bottom:24px;right:24px;background:#1e2330;color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;max-width:280px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#166534}
#toast.error{background:#991b1b}
</style>
</head>
<body data-roles="1,4">
<aside id="sidebar">
  <div class="logo">
    <div class="logo-title">🐾 現代寵物醫院</div>
    <div class="logo-sub">醫療與營運管理系統</div>
  </div>
  <nav></nav>
  <div class="user-info" id="user-info"></div>
</aside>

<div id="main">
  <div id="topbar">
    <div class="page-title">預約查詢</div>
    <div style="font-size:12px;color:#6b7280" id="topbar-date"></div>
  </div>
  <div id="content">

    <!-- 查詢條件 -->
    <div class="card">
      <div class="card-title">查詢條件</div>
      <div class="form-grid">
        <div class="field">
          <label>主治醫師</label>
          <select id="q-doctor">
            <option value="">— 選擇醫師 —</option>
          </select>
        </div>
        <div class="field">
          <label>日期</label>
          <input type="date" id="q-date">
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn-primary" onclick="querySchedule()">查詢</button>
      </div>
    </div>

    <!-- 查詢結果 -->
    <div class="card" id="result-card" style="display:none">
      <div class="card-title" id="result-title"></div>
      <div class="summary-row" id="summary-row"></div>
      <div id="result-table"></div>
    </div>

  </div>
</div>

<div id="toast"></div>
<script src="common.js"></script>
<script>
document.getElementById('topbar-date').textContent = todayStr();
document.getElementById('q-date').value = todayStr();

// 載入醫師清單
api('GET', '/doctors').then(docs => {
  const sel = document.getElementById('q-doctor');
  sel.innerHTML = '<option value="">— 選擇醫師 —</option>' +
    docs.map(d => `<option value="${d.Staff_ID}">${d.Staff_Name}（${d.Specialty}）</option>`).join('');
});

async function querySchedule() {
  const did  = document.getElementById('q-doctor').value;
  const date = document.getElementById('q-date').value;
  if (!did)  return toast('請選擇醫師', 'error');
  if (!date) return toast('請選擇日期', 'error');

  // GET /appointments?doctor_id=&date=
  const appts = await api('GET', `/appointments?doctor_id=${did}&date=${date}`);
  const doctor = MOCK.staff.find(d => d.Staff_ID == did);

  const card = document.getElementById('result-card');
  card.style.display = '';
  document.getElementById('result-title').textContent =
    `${doctor?.Staff_Name}（${doctor?.Specialty}）　${date}　預約清單`;

  // 統計
  const pending   = appts.filter(a => a.Appt_Status === 0).length;
  const done      = appts.filter(a => a.Appt_Status === 2).length;
  const cancelled = appts.filter(a => a.Appt_Status === 2 && !MOCK.records.some(r => r.Appointment_ID === a.Appointment_ID)).length;

  document.getElementById('summary-row').innerHTML = `
    <div class="summary-chip">全部<span>${appts.length}</span></div>
    <div class="summary-chip">待診<span style="color:#854d0e">${pending}</span></div>
    <div class="summary-chip">完成<span style="color:#166534">${done}</span></div>`;

  if (!appts.length) {
    document.getElementById('result-table').innerHTML =
      '<div style="font-size:12px;color:#9ca3af;padding:8px 0">該日無預約記錄</div>';
    return;
  }

  document.getElementById('result-table').innerHTML = `<table>
    <thead><tr><th>時間</th><th>寵物</th><th>飼主</th><th>狀態</th><th></th></tr></thead>
    <tbody>${appts.map(a => {
      const statusMap = {
        0: '<span class="badge badge-amber">待診</span>',
        1: '<span class="badge badge-green">進行中</span>',
        2: '<span class="badge badge-gray">完成/取消</span>',
      };
      const isCancellable = a.Appt_Status === 0;
      return `<tr class="${a.Appt_Status === 2 ? 'cancelled' : ''}">
        <td style="font-weight:500">${slotFromDatetime(a.Scheduled_Time)}</td>
        <td>${a.pet?.Pet_Name || '—'}（${a.pet?.Species_Type || '—'}）</td>
        <td>${a.owner?.Full_Name || '—'}</td>
        <td>${statusMap[a.Appt_Status] || a.Appt_Status}</td>
        <td>${isCancellable
          ? `<button class="btn-sm" style="color:#dc2626;border-color:#fca5a5" onclick="cancelAppt(${a.Appointment_ID})">取消預約</button>`
          : ''}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

async function cancelAppt(aid) {
  const appt = MOCK.appointments.find(a => a.Appointment_ID === aid);
  if (!confirm(`確定取消 ${slotFromDatetime(appt?.Scheduled_Time)} 的預約？`)) return;
  // PATCH /appointments/:id/cancel → Appt_Status = 2
  await api('PATCH', `/appointments/${aid}/cancel`);
  toast('✓ 預約已取消', 'success');
  querySchedule();   // 重新載入
}
</script>
</body>
</html>
