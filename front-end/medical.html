<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>病歷 / 處方 — 寵物醫院管理系統</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Noto Sans TC',sans-serif;background:#f4f6f9;color:#1a1a1a;display:flex;height:100vh;overflow:hidden;font-size:14px}
#sidebar{width:220px;background:#1e2330;display:flex;flex-direction:column;flex-shrink:0}
#sidebar .logo{padding:20px 18px 16px;border-bottom:1px solid #2d3347}
#sidebar .logo-title{font-size:14px;font-weight:600;color:#fff;line-height:1.4}
#sidebar .logo-sub{font-size:11px;color:#6b7280;margin-top:2px}
#sidebar nav{flex:1;padding:12px 0}
#sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 18px;color:#9ca3af;font-size:13px;cursor:pointer;border-left:3px solid transparent;text-decoration:none;transition:all .15s}
#sidebar nav a:hover{color:#e5e7eb;background:#252b3b}
#sidebar nav a.active{color:#fff;background:#252b3b;border-left-color:#3b82f6}
#sidebar nav a .icon{font-size:16px;width:20px;text-align:center}
#sidebar .user-info{padding:14px 18px;border-top:1px solid #2d3347}
#sidebar .user-role{font-size:11px;color:#6b7280}
#sidebar .user-name{font-size:13px;color:#d1d5db;margin-top:2px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar .page-title{font-size:15px;font-weight:500}
#content{flex:1;overflow-y:auto;padding:24px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px;margin-bottom:14px}
.card-title{font-size:12px;color:#6b7280;margin-bottom:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:#6b7280}
input[type=text],input[type=date],input[type=number],select,textarea{border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;color:#1a1a1a;background:#fafafa;width:100%;font-family:inherit;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;background:#fff}
input:disabled{background:#f0f0f0;color:#9ca3af;cursor:not-allowed}
textarea{resize:none}
.btn-row{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
button{border:1px solid #d1d5db;background:#fff;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
button:hover{background:#f9fafb}
button:active{transform:scale(.98)}
.btn-primary{background:#3b82f6;color:#fff;border-color:#2563eb}
.btn-primary:hover{background:#2563eb}
.btn-danger{background:#ef4444;color:#fff;border-color:#dc2626}
.btn-danger:hover{background:#dc2626}
.btn-sm{padding:5px 12px;font-size:12px}
.badge{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500}
.badge-amber{background:#fef9c3;color:#854d0e}
.badge-blue{background:#dbeafe;color:#1e40af}
.rec-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:all .1s}
.rec-item:last-child{border-bottom:none}
.rec-item:hover{background:#f9fafb;margin:0 -18px;padding:10px 18px;border-radius:6px}
.rec-meta{font-size:12px;color:#6b7280;margin-top:2px}
.td-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f3f4f6}
.td-row:last-child{border-bottom:none}
.td-name{flex:1;font-size:13px}
.td-meta{font-size:12px;color:#6b7280;white-space:nowrap}
.td-price{font-size:13px;color:#374151;white-space:nowrap;min-width:56px;text-align:right}
.td-del{background:none;border:none;color:#d1d5db;font-size:16px;cursor:pointer;padding:0 4px;line-height:1}
.td-del:hover{color:#ef4444}
.subtotal-row{display:flex;justify-content:space-between;padding:8px 0 0;font-size:14px;font-weight:600}
hr{border:none;border-top:1px solid #e5e7eb;margin:10px 0}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal-box{background:#fff;border-radius:12px;padding:24px;width:420px;max-width:90vw}
#modal-box h3{font-size:15px;margin-bottom:16px}
#modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
#toast{position:fixed;bottom:24px;right:24px;background:#1e2330;color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;max-width:280px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#166634}
#toast.error{background:#991b1b}
</style>
</head>
<body data-roles="2,3,4">
<aside id="sidebar">
  <div class="logo">
    <div class="logo-title">🐾 現代寵物醫院</div>
    <div class="logo-sub">醫療與營運管理系統</div>
  </div>
  <nav></nav>
  <div class="user-info" id="user-info"></div>
</aside>

<div id="main">
  <div id="topbar">
    <div class="page-title">病歷建立 ／ 開立處方</div>
    <div style="font-size:12px;color:#6b7280" id="topbar-date"></div>
  </div>
  <div id="content">

    <!-- 今日待診清單 -->
    <div class="card" id="appt-list-card">
      <div class="card-title">今日待診（點選開始看診）</div>
      <div id="today-appts"><span style="font-size:12px;color:#9ca3af">載入中…</span></div>
    </div>

    <!-- 看診區 -->
    <div id="medical-form" style="display:none">

      <div class="card">
        <div class="card-title">就診基本資訊</div>
        <div class="form-grid">
          <div>
            <div style="font-size:12px;color:#6b7280;margin-bottom:4px">寵物</div>
            <div id="mr-pet-info" style="font-size:13px;font-weight:500"></div>
          </div>
          <div>
            <div style="font-size:12px;color:#6b7280;margin-bottom:4px">飼主</div>
            <div id="mr-owner-info" style="font-size:13px"></div>
          </div>
        </div>
        <div class="form-grid">
          <div class="field"><label>看診日期</label><input type="date" id="mr-date" disabled></div>
          <div class="field"><label>主治醫師</label><input type="text" id="mr-doctor" disabled></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">臨床觀察與診斷</div>
        <div class="field" style="margin-bottom:10px">
          <label>Clinical_Notes（主觀觀察）</label>
          <textarea id="mr-notes" rows="2" placeholder="食慾不振、發燒 39.5°C、精神萎靡…"></textarea>
        </div>
        <div class="field">
          <label>Final_Diagnosis（最終診斷）</label>
          <textarea id="mr-diagnosis" rows="2" placeholder="急性上呼吸道感染…"></textarea>
        </div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="card-title" style="margin:0">治療明細</div>
          <button class="btn-sm" onclick="openAddItem()">＋ 新增項目</button>
        </div>
        <div id="td-list">
          <div style="font-size:12px;color:#9ca3af;padding:8px 0">尚未新增任何項目</div>
        </div>
        <hr>
        <div class="subtotal-row">
          <span style="font-size:13px;color:#6b7280">小計</span>
          <span id="td-subtotal">$0</span>
        </div>
      </div>

      <div class="btn-row">
        <button onclick="cancelVisit()">← 返回列表</button>
        <button onclick="saveDraft()">儲存草稿</button>
        <button class="btn-danger" onclick="lockRecord()">🔒 完成看診</button>
      </div>
    </div>

  </div>
</div>

<!-- 新增項目 Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h3>新增治療 / 處方項目</h3>
    <div class="field" style="margin-bottom:12px">
      <label>選擇項目（Catalog_Items）</label>
      <select id="item-select" onchange="onItemSelect(this.value)">
        <option value="">— 選擇 —</option>
      </select>
    </div>
    <div class="form-grid" id="item-fields" style="display:none">
      <div class="field">
        <label id="qty-label">Numeric_Value（數量）</label>
        <input type="number" id="item-qty" min="0.01" step="0.01" value="1" oninput="calcItemTotal()">
      </div>
      <div class="field">
        <label>Historical_Price（由 Trigger 覆寫）</label>
        <input type="text" id="item-price" disabled>
      </div>
    </div>
    <div id="item-total" style="font-size:13px;color:#6b7280;margin-top:4px"></div>
    <div id="modal-actions">
      <button onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="addItem()">新增</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="common.js"></script>
<script>
let mrState = { appt: null, Record_ID: null, details: [] };

document.getElementById('topbar-date').textContent = todayStr();
loadTodayAppts();

async function loadTodayAppts() {
  const appts = await api('GET', '/appointments/today');
  const el = document.getElementById('today-appts');
  if (!appts.length) {
    el.innerHTML = '<div style="font-size:12px;color:#9ca3af;padding:8px 0">今日無待診預約</div>';
    return;
  }
  el.innerHTML = appts.map(a => `
    <div class="rec-item" onclick="startVisit(${a.Appointment_ID})">
      <div>
        <div style="font-size:13px;font-weight:500">
          ${a.pet?.Pet_Name}（${a.pet?.Species_Type}）
        </div>
        <div class="rec-meta">
          ${slotFromDatetime(a.Scheduled_Time)}
          飼主：${a.owner?.Full_Name}
          醫師：${a.doctor?.Staff_Name}
        </div>
      </div>
      <span class="badge badge-amber">待診</span>
    </div>`).join('');
}

async function startVisit(apptId) {
  const appts = await api('GET', '/appointments/today');
  const a = appts.find(x => x.Appointment_ID === apptId);
  if (!a) return;
  mrState.appt    = a;
  mrState.details = [];

  // POST /records → 建立 Medical_Records 並同步建立 Invoices
  const rec = await api('POST', '/records', {
    Appointment_ID:    a.Appointment_ID,
    Consultation_Date: todayStr(),
    Clinical_Notes:    null,
    Final_Diagnosis:   null,
  });
  mrState.Record_ID = rec.Record_ID;

  document.getElementById('mr-pet-info').textContent =
    `${a.pet?.Pet_Name}（${a.pet?.Species_Type}・${calcAge(a.pet?.Birth_Date)}・${a.pet?.Current_Weight} kg）`;
  document.getElementById('mr-owner-info').textContent = a.owner?.Full_Name;
  document.getElementById('mr-date').value   = todayStr();
  document.getElementById('mr-doctor').value = a.doctor?.Staff_Name;
  document.getElementById('mr-notes').value    = '';
  document.getElementById('mr-diagnosis').value = '';
  document.getElementById('appt-list-card').style.display = 'none';
  document.getElementById('medical-form').style.display   = '';

  // 載入 Catalog_Items（未下架）
  const catalog = await api('GET', '/catalog');
  const sel = document.getElementById('item-select');
  sel.innerHTML = '<option value="">— 選擇 —</option>' +
    catalog.map(c =>
      `<option value="${c.Item_ID}">${c.Item_Name}（${categoryLabel(c.Item_Category)}）　$${c.Current_Price}</option>`
    ).join('');

  renderTdList();
}

function renderTdList() {
  const el    = document.getElementById('td-list');
  const total = mrState.details.reduce((s, d) => s + d.Historical_Price * d.Numeric_Value, 0);
  if (!mrState.details.length) {
    el.innerHTML = '<div style="font-size:12px;color:#9ca3af;padding:8px 0">尚未新增任何項目</div>';
    document.getElementById('td-subtotal').textContent = '$0';
    return;
  }
  el.innerHTML = mrState.details.map(d => {
    const item = MOCK.catalog.find(c => c.Item_ID === d.Item_ID);
    return `<div class="td-row">
      <span class="badge badge-blue" style="font-size:11px">${categoryLabel(item?.Item_Category)}</span>
      <span class="td-name">${item?.Item_Name || ''}</span>
      <span class="td-meta">×${d.Numeric_Value}　$${d.Historical_Price}</span>
      <span class="td-price">$${(d.Historical_Price * d.Numeric_Value).toLocaleString()}</span>
      <button class="td-del" onclick="removeDetail(${d.Detail_ID})">×</button>
    </div>`;
  }).join('');
  document.getElementById('td-subtotal').textContent = '$' + total.toLocaleString();
}

function openAddItem() {
  document.getElementById('item-select').value = '';
  document.getElementById('item-fields').style.display = 'none';
  document.getElementById('item-total').textContent = '';
  document.getElementById('item-qty').value = 1;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function onItemSelect(id) {
  if (!id) { document.getElementById('item-fields').style.display = 'none'; return; }
  const item = MOCK.catalog.find(c => c.Item_ID == id);
  document.getElementById('item-price').value = '$' + item.Current_Price + '（trigger 覆寫）';
  // Item_Category=2 (檢驗) 用「次數」，其他用「數量」
  document.getElementById('qty-label').textContent =
    item.Item_Category === 2 ? 'Numeric_Value（次數）' : 'Numeric_Value（數量）';
  document.getElementById('item-fields').style.display = '';
  calcItemTotal();
}

function calcItemTotal() {
  const id  = document.getElementById('item-select').value;
  if (!id) return;
  const item = MOCK.catalog.find(c => c.Item_ID == id);
  const qty  = parseFloat(document.getElementById('item-qty').value) || 1;
  document.getElementById('item-total').textContent = `小計：$${(item.Current_Price * qty).toLocaleString()}`;
}

async function addItem() {
  const id = parseInt(document.getElementById('item-select').value);
  if (!id) return toast('請選擇項目', 'error');
  const qty = parseFloat(document.getElementById('item-qty').value) || 1;

  // Historical_Price 傳 0，server 端 trigger (trg_td_before_insert) 會強制覆寫
  const detail = await api('POST', `/records/${mrState.Record_ID}/details`, {
    Item_ID:       id,
    Numeric_Value: qty,
    Historical_Price: 0,   // trigger 覆寫，前端傳任意值皆無效
    Polymorphic_Text1: null,
    Polymorphic_Text2: null,
  });
  mrState.details.push(detail);
  renderTdList();
  closeModal();
  toast('已新增項目');
}

async function removeDetail(did) {
  await api('DELETE', `/records/${mrState.Record_ID}/details/${did}`);
  mrState.details = mrState.details.filter(d => d.Detail_ID !== did);
  renderTdList();
}

async function saveDraft() {
  // PATCH /records/:rid/draft
  await api('PATCH', `/records/${mrState.Record_ID}/draft`, {
    Clinical_Notes:  document.getElementById('mr-notes').value,
    Final_Diagnosis: document.getElementById('mr-diagnosis').value,
  });
  toast('草稿已儲存');
}

async function lockRecord() {
  if (!mrState.details.length) return toast('請先新增至少一項治療項目', 'error');
  // PATCH /records/:rid/lock → Record_Locked=TRUE → 後端觸發 trg_mr_after_update 扣庫存
  await api('PATCH', `/records/${mrState.Record_ID}/lock`, {
    Clinical_Notes:  document.getElementById('mr-notes').value,
    Final_Diagnosis: document.getElementById('mr-diagnosis').value,
    Record_Locked:   true,
  });
  toast('✓ 病歷已鎖定，庫存已扣減，帳單已建立', 'success');
  cancelVisit();
  loadTodayAppts();
}

function cancelVisit() {
  mrState = { appt: null, Record_ID: null, details: [] };
  document.getElementById('medical-form').style.display   = 'none';
  document.getElementById('appt-list-card').style.display = '';
}
</script>
</body>
</html>
